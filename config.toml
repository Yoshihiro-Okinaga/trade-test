use_process_pool = true

# 売買判定の閾値（幅）。|signal| がこの値を超えたら売買する。
# 指標ごとに値のスケールが違うので、指標ごとに設定する。
# ここに書かない指標は default_threshold_width が使われる。
default_threshold_width = 1.0

[threshold_width]
bb = 2.0
rsi = 20.0
stoch = 30.0

# 指標の中心値。rsi/stoch は 0〜100 の範囲で中心 50。
# rsi は 30/70、stoch は 20/80 で判定する。
# ここに書かない指標は中心 0 とみなす（bb, change, sma, macd, di）。
[threshold_center]
rsi = 50.0
stoch = 50.0


# 売買コスト（値幅）。銘柄ごとに、仕掛け時に1回だけ引かれる片道コスト。
# 元コードで判明している値のみ設定済み。残りは 0.0 なので、
# 実際のブローカーのスプレッドが分かり次第、各自で埋めること。
# ここが 0.0 のままだと、その銘柄はコストなしで評価される点に注意。
